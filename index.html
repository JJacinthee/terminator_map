<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球晨昏线 · 昼夜时长</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1923; color: #e0e8f0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

/* ── Header ── */
header { padding: 8px 14px; border-bottom: 1px solid #1e2d3d; display: flex; align-items: center; gap: 12px; flex-shrink: 0; flex-wrap: wrap; }
header h1 { font-size: 14px; font-weight: 500; color: #c8daf0; white-space: nowrap; }
.search-wrap { position: relative; flex: 1; min-width: 160px; max-width: 320px; }
.search-wrap input { width: 100%; background: #141f2e; border: 1px solid #1e2d3d; border-radius: 6px; padding: 6px 10px 6px 30px; font-size: 13px; color: #c8daf0; outline: none; }
.search-wrap input:focus { border-color: #378add; }
.search-wrap input::placeholder { color: #3a5a7a; }
.search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: #3a5a7a; font-size: 14px; pointer-events: none; }
.search-dropdown { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: #141f2e; border: 1px solid #1e2d3d; border-radius: 6px; max-height: 220px; overflow-y: auto; z-index: 200; display: none; }
.search-dropdown.open { display: block; }
.search-item { padding: 8px 12px; font-size: 13px; cursor: pointer; border-bottom: 1px solid #1a2535; }
.search-item:last-child { border-bottom: none; }
.search-item:hover, .search-item.active { background: #1e2d3d; }
.search-item .city-cn { color: #c8daf0; }
.search-item .city-en { color: #5a7a9a; font-size: 11px; margin-left: 6px; }
.search-item .city-country { color: #3a5a7a; font-size: 11px; float: right; }

/* ── Main layout: desktop side-by-side, mobile stacked ── */
.main { display: flex; flex: 1; overflow: hidden; min-height: 0; }
.map-area { flex: 1; display: flex; flex-direction: column; padding: 10px; gap: 8px; min-width: 0; min-height: 0; }

/* ── Controls ── */
.controls { display: flex; flex-wrap: wrap; gap: 8px 14px; align-items: center; background: #141f2e; border-radius: 8px; padding: 8px 12px; border: 1px solid #1e2d3d; flex-shrink: 0; }
.ctrl-group { display: flex; align-items: center; gap: 6px; }
.ctrl-group label { font-size: 12px; color: #7a9ab8; white-space: nowrap; }
.ctrl-group input[type=range] { width: 100px; accent-color: #378add; cursor: pointer; }
.ctrl-group .val { font-size: 13px; font-weight: 500; color: #c8daf0; min-width: 46px; }
.ctrl-group .val.decl { font-size: 11px; color: #7a9ab8; min-width: 80px; }

/* ── Map ── */
.map-svg-wrap { flex: 1; min-height: 0; position: relative; }
#mapSvg { width: 100%; height: 100%; border-radius: 8px; border: 1px solid #1e2d3d; cursor: crosshair; display: block; }
.legend { display: flex; gap: 10px; font-size: 10px; color: #5a7a9a; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
.legend-item { display: flex; align-items: center; gap: 3px; }
.legend-dot { width: 8px; height: 8px; border-radius: 2px; }

/* ── Sidebar: desktop fixed width, mobile bottom drawer ── */
.sidebar { width: 252px; min-width: 252px; background: #141f2e; border-left: 1px solid #1e2d3d; padding: 12px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; flex-shrink: 0; }
.info-card { background: #0f1923; border-radius: 8px; padding: 12px; border: 1px solid #1e2d3d; }
.info-card h3 { font-size: 11px; color: #5a7a9a; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
.city-title { font-size: 16px; font-weight: 500; color: #c8daf0; margin-bottom: 2px; }
.city-sub { font-size: 12px; color: #5a7a9a; margin-bottom: 10px; }
.daynight-bar { display: flex; height: 20px; border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
.bar-day { background: #378add; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; font-weight: 500; }
.bar-night { background: #0d1520; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #5a7a9a; font-weight: 500; }
.stat-row { display: flex; justify-content: space-between; align-items: baseline; padding: 4px 0; border-bottom: 1px solid #1a2535; }
.stat-row:last-child { border-bottom: none; }
.stat-label { font-size: 12px; color: #5a7a9a; }
.stat-val { font-size: 13px; font-weight: 500; color: #c8daf0; }
.stat-val.hi { color: #f5a623; }
.hint { font-size: 12px; color: #3a5a7a; text-align: center; padding: 16px 0; line-height: 1.7; }

/* ── 手机端适配 (≤ 640px) ── */
@media (max-width: 640px) {
  body { overflow: auto; height: auto; min-height: 100dvh; }
  header { padding: 8px 10px; gap: 8px; }
  header h1 { font-size: 13px; }
  .search-wrap { max-width: 100%; }

  .main { flex-direction: column; overflow: visible; height: auto; }

  .map-area { padding: 6px; gap: 6px; }

  /* 滑块控件：竖排，每组占满宽度 */
  .controls { flex-direction: column; align-items: stretch; gap: 6px; padding: 8px 10px; }
  .ctrl-group { justify-content: space-between; }
  .ctrl-group input[type=range] { flex: 1; width: auto; min-width: 0; margin: 0 8px; }
  .ctrl-group .val { min-width: 52px; text-align: right; }
  .ctrl-group .val.decl { min-width: auto; }

  /* 地图固定高度 */
  .map-svg-wrap { height: 52vw; min-height: 180px; max-height: 260px; flex: none; }

  /* 图例精简 */
  .legend { gap: 8px; font-size: 10px; }
  .legend-item:last-child { display: none; } /* 隐藏"点击地图选择地点"提示 */

  /* 侧边栏变为底部卡片 */
  .sidebar { width: 100%; min-width: 0; border-left: none; border-top: 1px solid #1e2d3d; padding: 10px; flex-shrink: 0; overflow-y: visible; max-height: none; }

  /* 年度图表适配 */
  #yearCanvas { width: 100% !important; height: 90px !important; }
}

/* ── 平板端 (641px – 900px) ── */
@media (min-width: 641px) and (max-width: 900px) {
  .sidebar { width: 210px; min-width: 210px; }
  .ctrl-group input[type=range] { width: 85px; }
}
</style>

<header>

    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜索城市（中文或英文）…" autocomplete="off">
    <div class="search-dropdown" id="searchDropdown"></div>
  </div>
</header>

<div class="main">

      <div class="ctrl-group">
        <label>月份</label>
        <input type="range" id="monthSlider" min="1" max="12" value="2" step="1">

      </div>
      <div class="ctrl-group">
        <label>日期</label>
        <input type="range" id="daySlider" min="1" max="31" value="15" step="1">

      <div class="ctrl-group">
        <label>UTC时刻</label>
        <input type="range" id="hourSlider" min="0" max="23" value="12" step="1">
        <span class="val" id="hourLabel">12:00</span>
      </div>
      <div class="ctrl-group">
        <span class="val decl" id="declLabel"></span>
      </div>
    </div>

    <div class="map-svg-wrap">
      <svg id="mapSvg" viewBox="0 0 900 460" preserveAspectRatio="xMidYMid meet"></svg>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#1e3d2e"></div>白昼陆地</div>
      <div class="legend-item"><div class="legend-dot" style="background:#060e1a"></div>黑夜区域</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f5a623"></div>晨昏线</div>
      <div class="legend-item"><div class="legend-dot" style="background:#FFD700;border-radius:50%"></div>太阳直射点</div>
      <div class="legend-item" style="margin-left:auto;color:#3a5a7a;">点击地图选择地点</div>
    </div>
  </div>

  <div class="sidebar">
    <div class="info-card" id="locationCard">
      <h3>选中地点</h3>
      <div class="hint">← 搜索或点击地图<br>查看该地昼夜时长<br>及全年变化曲线</div>
    </div>
  </div>
</div>

const W = 900, H = 460;
const svg = d3.select('#mapSvg');
const projection = d3.geoEquirectangular().scale(W/(2*Math.PI)).translate([W/2,H/2]);
const pathGen = d3.geoPath(projection);

const layers = {};
['ocean','land','night','terminator','cities','marker'].forEach(n => {
  layers[n] = svg.append('g').attr('class', n);
});
layers.ocean.append('rect').attr('width',W).attr('height',H).attr('fill','#0a1520');

let selectedPoint = null;

const MONTHS_CN = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const DAYS_IN_MONTH = [31,28,31,30,31,30,31,31,30,31,30,31];

function dayOfYear(m,d) {
  let n=0; for(let i=1;i<m;i++) n+=DAYS_IN_MONTH[i-1]; return n+d;
}
function sunDecl(m,d) {
  const N = dayOfYear(m,d);
  return -23.45 * Math.cos(2*Math.PI/365*(N+10)) * Math.PI/180;
}
function daylightH(latDeg, decl) {
  const lat = latDeg*Math.PI/180;
  const cosH = -Math.tan(lat)*Math.tan(decl);
  if(cosH<=-1) return 24;
  if(cosH>=1) return 0;
  return 2*Math.acos(cosH)*180/Math.PI/15;
}
function termPts(decl, utcH) {
  const sLon = -(utcH/24)*360+180;
  const pts=[];
  for(let lon=-180;lon<=180;lon+=0.5){
    const lonRad=(lon-sLon)*Math.PI/180;
    const lat=Math.atan(-Math.cos(lonRad)/Math.tan(decl))*180/Math.PI;
    pts.push([lon,lat]);
  }
  return pts;
}
function nightPoly(decl, utcH) {
  const tp = termPts(decl,utcH);
  const coords=[];
  if(decl<0){
    coords.push([-180,90]);
    for(let i=tp.length-1;i>=0;i--) coords.push(tp[i]);
    coords.push([180,90]);
  } else {
    coords.push([-180,-90]);
    for(let i=0;i<tp.length;i++) coords.push(tp[i]);
    coords.push([180,-90]);
  }
  return {type:'Feature',geometry:{type:'Polygon',coordinates:[coords]}};
}
function haversine(lat1,lon1,lat2,lon2) {
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function nearestCity(lon,lat) {
  let best=null, bestD=Infinity;
  CITIES.forEach(c => {
    const d=haversine(lat,lon,c[3],c[4]);
    if(d<bestD){bestD=d;best=c;}
  });
  return bestD<400 ? {city:best, dist:bestD} : null;
}
function formatH(h) {
  const hh=Math.floor(h), mm=Math.round((h-hh)*60);
  return `${hh}h ${String(mm).padStart(2,'0')}m`;
}
function solarTime(latDeg, decl, isRise) {
  const lat=latDeg*Math.PI/180;
  const cosH=-Math.tan(lat)*Math.tan(decl);
  if(cosH<=-1||cosH>=1) return null;
  const H=Math.acos(cosH)*180/Math.PI/15;
  const t = isRise ? 12-H : 12+H;
  const hh=Math.floor(t), mm=Math.round((t-hh)*60);
  return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
}

// ── 简易tooltip ──
let tooltip = null;
function showTooltip(event, text) {
  if(!tooltip){
    tooltip = document.createElement('div');
    tooltip.style.cssText='position:fixed;background:#1e2d3d;color:#c8daf0;font-size:12px;padding:4px 8px;border-radius:4px;pointer-events:none;z-index:999;border:1px solid #2e3d4d;';
    document.body.appendChild(tooltip);
  }
  tooltip.textContent=text;
  tooltip.style.display='block';
  tooltip.style.left=(event.clientX+12)+'px';
  tooltip.style.top=(event.clientY-10)+'px';
}
function hideTooltip() { if(tooltip) tooltip.style.display='none'; }

// ── 选中地点 ──
function selectLocation(lon, lat, cityObj) {
  selectedPoint=[lon,lat];
  layers.marker.selectAll('*').remove();
  const p=projection([lon,lat]);
  layers.marker.append('circle').attr('cx',p[0]).attr('cy',p[1]).attr('r',8)
    .attr('fill','none').attr('stroke','#f5a623').attr('stroke-width',2);
  layers.marker.append('circle').attr('cx',p[0]).attr('cy',p[1]).attr('r',3)
    .attr('fill','#f5a623');
  const m=+document.getElementById('monthSlider').value;
  const d=Math.min(+document.getElementById('daySlider').value,DAYS_IN_MONTH[m-1]);
  updateSidebar(lon,lat,m,d,cityObj);
}

function updateSidebar(lon, lat, month, day, cityObj) {
  const decl=sunDecl(month,day);
  const dayH=daylightH(lat,decl);
  const nightH=24-dayH;
  const dayPct=(dayH/24*100);
  const isPolarDay=dayH>=24, isPolarNight=dayH<=0;

  const rise=solarTime(lat,decl,true);
  const set=solarTime(lat,decl,false);

  const latStr=lat>=0?lat.toFixed(2)+'°N':Math.abs(lat).toFixed(2)+'°S';
  const lonStr=lon>=0?lon.toFixed(2)+'°E':Math.abs(lon).toFixed(2)+'°W';

  const yearData=[];
  for(let m=1;m<=12;m++) yearData.push(daylightH(lat,sunDecl(m,15)));

  const card=document.getElementById('locationCard');
  const cityName = cityObj ? `<div class="city-title">${cityObj[0]}</div><div class="city-sub">${cityObj[1]} · ${cityObj[2]}</div>` :
    `<div class="city-title">${latStr}</div><div class="city-sub">${lonStr}</div>`;
  const coordLine = cityObj ? `<div class="city-sub" style="margin-top:-6px;margin-bottom:10px;">${latStr} ${lonStr}</div>` : '';

  card.innerHTML=`
    <h3>选中地点</h3>
    ${cityName}${coordLine}
    <div class="daynight-bar">
      <div class="bar-day" style="width:${dayPct.toFixed(1)}%">${dayH>=3?Math.round(dayH)+'h':''}</div>
      <div class="bar-night" style="width:${(100-dayPct).toFixed(1)}%">${nightH>=3?Math.round(nightH)+'h':''}</div>
    </div>
    <div style="margin-bottom:8px;font-size:11px;color:#5a7a9a;">${MONTHS_CN[month-1]}${day}日</div>
    <div class="stat-row"><span class="stat-label">昼长</span>
      <span class="stat-val hi">${isPolarDay?'24h（极昼）':isPolarNight?'—（极夜）':formatH(dayH)}</span></div>
    <div class="stat-row"><span class="stat-label">夜长</span>
      <span class="stat-val">${isPolarNight?'24h（极夜）':isPolarDay?'—（极昼）':formatH(nightH)}</span></div>
    <div class="stat-row"><span class="stat-label">日出（太阳时）</span>
      <span class="stat-val">${isPolarDay?'——':isPolarNight?'——':rise||'——'}</span></div>
    <div class="stat-row"><span class="stat-label">日落（太阳时）</span>
      <span class="stat-val">${isPolarDay?'——':isPolarNight?'——':set||'——'}</span></div>
    <div style="margin-top:14px;margin-bottom:6px;font-size:11px;color:#5a7a9a;text-transform:uppercase;letter-spacing:0.06em;">全年昼长变化</div>
    <canvas id="yearCanvas" style="width:100%;height:110px;display:block;"></canvas>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:#3a5a7a;margin-top:2px;"><span>1月</span><span>4月</span><span>7月</span><span>10月</span><span>12月</span></div>
  `;
  requestAnimationFrame(()=>drawYearChart(yearData,month-1,dayH));
}

function drawYearChart(yearData, curIdx, curDayH) {
  const canvas=document.getElementById('yearCanvas');
  if(!canvas) return;
  // 响应式：用实际渲染宽度
  const displayW=canvas.offsetWidth||224;
  canvas.width=displayW; canvas.height=110;
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  const pad={top:8,right:6,bottom:4,left:26};

  ctx.clearRect(0,0,W,H);

  // grid
  [0,6,12,18,24].forEach(v=>{
    const y=pad.top+(1-v/24)*(H-pad.top-pad.bottom);
    ctx.strokeStyle='rgba(255,255,255,0.07)'; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(W-pad.right,y); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.font='9px sans-serif';
    ctx.fillText(v,0,y+3);
  });

  const xs=i=>pad.left+(i/11)*(W-pad.left-pad.right);
  const ys=v=>pad.top+(1-Math.min(v,24)/24)*(H-pad.top-pad.bottom);

  // fill
  const grad=ctx.createLinearGradient(0,pad.top,0,H-pad.bottom);
  grad.addColorStop(0,'rgba(55,138,221,0.35)');
  grad.addColorStop(1,'rgba(55,138,221,0.03)');
  ctx.beginPath();
  yearData.forEach((v,i)=>{ if(i===0) ctx.moveTo(xs(i),ys(v)); else ctx.lineTo(xs(i),ys(v)); });
  ctx.lineTo(xs(11),H-pad.bottom); ctx.lineTo(xs(0),H-pad.bottom);
  ctx.closePath(); ctx.fillStyle=grad; ctx.fill();

  // line
  ctx.beginPath(); ctx.strokeStyle='#378add'; ctx.lineWidth=1.5;
  yearData.forEach((v,i)=>{ if(i===0) ctx.moveTo(xs(i),ys(v)); else ctx.lineTo(xs(i),ys(v)); });
  ctx.stroke();

  // current dot
  ctx.beginPath(); ctx.arc(xs(curIdx),ys(yearData[curIdx]),4,0,Math.PI*2);
  ctx.fillStyle='#f5a623'; ctx.fill();

  // vertical dashed
  ctx.strokeStyle='rgba(245,166,35,0.4)'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(xs(curIdx),pad.top); ctx.lineTo(xs(curIdx),H-pad.bottom); ctx.stroke();
  ctx.setLineDash([]);
}

// ── 主渲染 ──
function render() {
  const month=+document.getElementById('monthSlider').value;
  const maxD=DAYS_IN_MONTH[month-1];
  const daySlider=document.getElementById('daySlider');
  daySlider.max=maxD;
  if(+daySlider.value>maxD) daySlider.value=maxD;
  const day=+daySlider.value;
  const hour=+document.getElementById('hourSlider').value;

  document.getElementById('monthLabel').textContent=MONTHS_CN[month-1];
  document.getElementById('dayLabel').textContent=day+'日';
  document.getElementById('hourLabel').textContent=String(hour).padStart(2,'0')+':00';

  const decl=sunDecl(month,day);
  const declDeg=(decl*180/Math.PI).toFixed(2);
  document.getElementById('declLabel').textContent=`赤纬 ${declDeg>0?'+':''}${declDeg}°`;

  layers.night.selectAll('*').remove();
  layers.terminator.selectAll('*').remove();

  layers.night.append('path').datum(nightPoly(decl,hour))
    .attr('d',pathGen).attr('fill','rgba(0,5,20,0.74)');

  const tp=termPts(decl,hour);
  const lpd=tp.map(p=>projection(p));
  layers.terminator.append('path')
    .attr('d','M'+lpd.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join('L'))
    .attr('stroke','#f5a623').attr('stroke-width',2).attr('fill','none');

  const sLon=((-(hour/24)*360+180)+180)%360-180;
  const sunPos=projection([sLon,decl*180/Math.PI]);
  if(sunPos) {
    layers.terminator.append('circle')
      .attr('cx',sunPos[0]).attr('cy',sunPos[1]).attr('r',7)
      .attr('fill','#FFD700').attr('stroke','#f5a623').attr('stroke-width',2);
  }

  if(selectedPoint) {
    const near=nearestCity(selectedPoint[0],selectedPoint[1]);
    updateSidebar(selectedPoint[0],selectedPoint[1],month,day,near?near.city:null);
  }
}

// ── 地图点击 ──
function handleMapClick(event) {
  const svgEl=document.getElementById('mapSvg');
  const bbox=svgEl.getBoundingClientRect();
  // 将屏幕坐标精确映射到SVG viewBox坐标
  const scaleX=W/bbox.width, scaleY=H/bbox.height;
  let clientX, clientY;
  if(event.touches && event.touches.length>0) {
    clientX=event.touches[0].clientX; clientY=event.touches[0].clientY;
  } else if(event.changedTouches && event.changedTouches.length>0) {
    clientX=event.changedTouches[0].clientX; clientY=event.changedTouches[0].clientY;
  } else {
    clientX=event.clientX; clientY=event.clientY;
  }
  const svgX=(clientX-bbox.left)*scaleX;
  const svgY=(clientY-bbox.top)*scaleY;
  const coords=projection.invert([svgX,svgY]);
  if(!coords) return;
  const [lon,lat]=coords;
  if(lat<-90||lat>90||lon<-180||lon>180) return;
  const near=nearestCity(lon,lat);
  selectLocation(near?near.city[4]:lon, near?near.city[3]:lat, near?near.city:null);
}
svg.on('click', handleMapClick);
document.getElementById('mapSvg').addEventListener('touchend', function(e){
  e.preventDefault(); handleMapClick(e);
}, {passive:false});

const searchInput=document.getElementById('searchInput');

searchInput.addEventListener('input', function() {
  const q=this.value.trim().toLowerCase();
  if(!q){ searchDropdown.classList.remove('open'); return; }
  const results=CITIES.filter(c=>
    c[0].includes(this.value.trim()) ||
    c[1].toLowerCase().includes(q) ||
    c[2].includes(this.value.trim())
  ).slice(0,12);
  if(!results.length){ searchDropdown.classList.remove('open'); return; }
  searchDropdown.innerHTML=results.map((c,i)=>
    `<div class="search-item" data-idx="${i}" data-lon="${c[4]}" data-lat="${c[3]}" data-i="${CITIES.indexOf(c)}">
      <span class="city-cn">${c[0]}</span><span class="city-en">${c[1]}</span>
      <span class="city-country">${c[2]}</span>
    </div>`
  ).join('');
  searchDropdown.classList.add('open');
  searchDropdown.querySelectorAll('.search-item').forEach(el=>{
    el.addEventListener('click',()=>{
      const lon=+el.dataset.lon, lat=+el.dataset.lat, idx=+el.dataset.i;
      searchInput.value=CITIES[idx][0]+' '+CITIES[idx][1];
      searchDropdown.classList.remove('open');
      selectLocation(lon,lat,CITIES[idx]);
    });
  });
});

});

      .attr('stroke-width',lat===0?1:0.5).attr('fill','none');
  });
  [-120,-60,0,60,120].forEach(lon=>{
    const pts=d3.range(-90,91,2).map(lat=>projection([lon,lat]));
    gridG.append('path').attr('d','M'+pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join('L'))
      .attr('stroke','rgba(255,255,255,0.05)').attr('stroke-width',0.5).attr('fill','none');
  });

  drawCityDots();
  render();
});
</script>
</body>
</html>
